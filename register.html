<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Septic System Services</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body style="background: var(--bg-alt); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    
    <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;">
        <button id="themeToggle" class="icon-btn" aria-label="Toggle Dark Mode" style="background: var(--card-bg); box-shadow: 0 2px 5px var(--shadow);">🌙</button>
        <button id="rtlToggle" class="icon-btn" aria-label="Toggle RTL" style="background: var(--card-bg); box-shadow: 0 2px 5px var(--shadow);">🌐</button>
    </div>

    <div class="auth-card card" style="width: 100%; max-width: 450px; text-align: center;">
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 25px; font-size: 2rem;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--primary)"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8zm0 18c-3.35 0-6-2.57-6-6.2 0-2.34 1.95-5.44 6-9.14 4.05 3.7 6 6.79 6 9.14 0 3.63-2.65 6.2-6 6.2z"/></svg>
            SepticCore
        </a>
        <h2 class="mb-2">Create an Account</h2>
        <p class="text-muted mb-2">Join us to manage your septic services efficiently.</p>
        
        <form id="regForm" onsubmit="event.preventDefault(); window.location.href='login.html';">
            
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div class="text-left">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 5px;">Full Name *</label>
                    <input type="text" class="form-control" placeholder="John Doe" required style="padding: 14px;">
                </div>
                
                <div class="text-left">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 5px;">Email Address *</label>
                    <input type="email" class="form-control" placeholder="john@example.com" required style="padding: 14px;">
                </div>
                
                <div class="text-left">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 5px;">Phone Number *</label>
                    <input type="tel" class="form-control" placeholder="(555) 555-5555" required style="padding: 14px;">
                </div>
                
                <div class="text-left" style="position: relative;">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 5px;">Password *</label>
                    <input type="password" class="form-control" placeholder="Create a password" id="reg-password" required style="padding: 14px; padding-right: 45px;">
                    <button type="button" onclick="document.getElementById('reg-password').type = document.getElementById('reg-password').type === 'password' ? 'text' : 'password'" style="position: absolute; right: 15px; bottom: 12px; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-muted);" aria-label="Toggle password visibility">👁️</button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100" style="padding: 14px; font-size: 1.1rem; margin-top: 25px;">Create Account</button>
            
            <div style="position: relative; text-align: center; margin: 2rem 0;">
                <hr style="border: none; border-top: 1px solid var(--border);">
                <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 0 15px; color: var(--text-muted); font-size: 0.9rem; white-space: nowrap;">Or sign up with</span>
            </div>
            
            <div style="display: flex; gap: 15px; margin-bottom: 2rem;">
                <button type="button" class="btn btn-secondary" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--bg-alt); font-weight: 500;">
                    <img src="data:image/svg+xml;charset=utf-8,%3Csvg width='18' height='18' viewBox='0 0 48 48' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23FFC107' d='M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z'/%3E%3Cpath fill='%23FF3D00' d='M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z'/%3E%3Cpath fill='%234CAF50' d='M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z'/%3E%3Cpath fill='%231976D2' d='M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z'/%3E%3C/svg%3E" alt="Google">
                    Google
                </button>
                <button type="button" class="btn btn-secondary" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--bg-alt); font-weight: 500;">
                    <img src="data:image/svg+xml;charset=utf-8,%3Csvg width='18' height='18' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M17.05,20.28c-1.28,1.31-2.61,2.65-4,2.65-1.42,0-2-1-3.6-1-1.63,0-2.22,1-3.6,1-1.42,0-2.82-1.41-4.05-2.73-2.65-3.08-4.52-8.52-1.92-12C2.07,5.92,4.8,4.52,6.54,4.52c1.37,0,2.67,1,3.48,1,.84,0,2.37-1.15,4-1.12,1.72,0,3.31.7,4.2,2.02-3.6,2.15-3,6.86.38,8.23-.84,2.05-1.9,4.25-3.4,5.82zM12,4.2c-0.28-2.12,1.65-4.1,3.7-4.2C15.95,2.18,14.07,4.38,12,4.2z' fill='%23000'/%3E%3C/svg%3E" alt="Apple" style="filter: invert(var(--apple-invert, 0));">
                    Apple
                </button>
            </div>
            
            <p class="mt-2 text-muted">Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 700; margin-left: 5px;">Sign In</a></p>
        </form>
    </div>

    <style>
        [data-theme="dark"] {
            --apple-invert: 1;
        }
    </style>
    <script src="assets/js/main.js"></script>
</body>
</html>
