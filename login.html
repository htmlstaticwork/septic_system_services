<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Septic System Services</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230f4c81'%3E%3Cpath d='M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8zm0 18c-3.35 0-6-2.57-6-6.2 0-2.34 1.95-5.44 6-9.14 4.05 3.7 6 6.79 6 9.14 0 3.63-2.65 6.2-6 6.2z'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body style="background: var(--bg-alt); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    


    <div class="auth-card card" style="width: 100%; max-width: 450px; text-align: center;">
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 30px; font-size: 2rem;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--primary)"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8zm0 18c-3.35 0-6-2.57-6-6.2 0-2.34 1.95-5.44 6-9.14 4.05 3.7 6 6.79 6 9.14 0 3.63-2.65 6.2-6 6.2z"/></svg>
            SepticCore
        </a>
        <h2 class="mb-2">Login to Account</h2>
        <p class="text-muted mb-2">Welcome back! Please enter your details.</p>
        
        <form id="loginForm" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <div class="form-group mb-1 text-left">
                <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 5px;">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email" required style="padding: 14px;">
            </div>
            
            <div class="form-group mb-1 text-left" style="position: relative;">
                <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 5px;">Password</label>
                <input type="password" class="form-control" placeholder="Enter your password" id="password" required style="padding: 14px; padding-right: 45px;">
                <button type="button" onclick="document.getElementById('password').type = document.getElementById('password').type === 'password' ? 'text' : 'password'" style="position: absolute; right: 15px; bottom: 12px; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-muted);" aria-label="Toggle password visibility">👁️</button>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.85rem; margin-top: 15px; flex-wrap: nowrap; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; white-space: nowrap;">
                    <input type="checkbox" style="width: 16px; height: 16px; accent-color: var(--primary);"> 
                    <span class="text-muted">Remember Me</span>
                </label>
                <a href="#" style="color: var(--primary); font-weight: 600; white-space: nowrap;">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-2" style="padding: 14px; font-size: 1.1rem;">Sign In</button>
            
            <div style="position: relative; text-align: center; margin: 2rem 0;">
                <hr style="border: none; border-top: 1px solid var(--border);">
                <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 0 15px; color: var(--text-muted); font-size: 0.9rem; white-space: nowrap;">Or continue with</span>
            </div>
            
            <div class="social-group">
                <button type="button" class="btn social-btn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 12px; background: #ffffff; border: 1px solid #e5e7eb; color: #111827; font-weight: 600; padding: 12px; border-radius: 8px; transition: all 0.2s ease;">
                    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20c11.045 0 20-8.955 20-20 0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4c-7.682 0-14.344 4.337-17.694 10.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
                    Google
                </button>
                <button type="button" class="btn social-btn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 12px; background: #ffffff; border: 1px solid #e5e7eb; color: #111827; font-weight: 600; padding: 12px; border-radius: 8px; transition: all 0.2s ease;">
                    <svg width="20" height="20" viewBox="0 0 384 512" fill="currentColor"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                    Apple
                </button>
            </div>

            
            <p class="mt-2 text-muted">Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 700; margin-left: 5px;">Register Now</a></p>
        </form>
    </div>

    <!-- Inject theme logic for Apple invert -->
    <style>
        [data-theme="dark"] {
            --apple-invert: 1;
        }
        .social-group {
            display: flex;
            gap: 15px;
            margin-bottom: 2rem;
        }
        @media (max-width: 480px) {
            .social-group {
                flex-direction: column;
                gap: 10px;
            }
        }
        .social-btn:hover {
            background-color: #f9fafb !important;
            border-color: #d1d5db !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        [data-theme="dark"] .social-btn:hover {
            background-color: #1f2937 !important;
            border-color: #374151 !important;
            color: #ffffff !important;
        }
    </style>
    <button id="backToTop" class="back-to-top" aria-label="Back to Top">↑</button>
    <script src="assets/js/main.js"></script>
</body>
</html>
