        .countdown {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 40px 0;

        .time-box {
            background: var(--card-bg);

            border-radius: 12px;
            padding: 20px 30px;
            min-width: 120px;
            box-shadow: 0 4px 15px var(--shadow);

            color: var(--primary);
            line-height: 1;
        }
        .time-label {
