<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Septic System Services</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .countdown {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 40px 0;
            flex-wrap: wrap;
        }
        .time-box {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px 30px;
            min-width: 120px;
            box-shadow: 0 4px 15px var(--shadow);
        }
        .time-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }
        .time-label {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
    </style>
</head>
<body style="background: var(--bg-alt);">
    <nav class="navbar" style="background: var(--bg-alt); box-shadow: none; border-bottom: 1px solid var(--border);">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--primary)"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8zm0 18c-3.35 0-6-2.57-6-6.2 0-2.34 1.95-5.44 6-9.14 4.05 3.7 6 6.79 6 9.14 0 3.63-2.65 6.2-6 6.2z"/></svg>
                SepticCore
            </a>
            <div class="nav-menu">
                <div class="nav-actions">
                    <button id="themeToggle" class="icon-btn" aria-label="Toggle Dark Mode">🌙</button>
                    <button id="rtlToggle" class="icon-btn" aria-label="Toggle RTL">🌐</button>
                    <a href="index.html" class="btn btn-secondary">Back to Home</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="section container text-center" style="min-height: 85vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h1 style="font-size: 4rem; color: var(--text); margin-bottom: 10px;">We're Launching Soon</h1>
        <p class="text-muted" style="font-size: 1.25rem; max-width: 600px;">Our new digital platform is currently under construction. We're working hard to bring you the best online experience for managing your septic services.</p>
        
        <div class="countdown">
            <div class="time-box">
                <div class="time-value">12</div>
                <div class="time-label">Days</div>
            </div>
            <div class="time-box">
                <div class="time-value">05</div>
                <div class="time-label">Hours</div>
            </div>
            <div class="time-box">
                <div class="time-value">45</div>
                <div class="time-label">Mins</div>
            </div>
            <div class="time-box">
                <div class="time-value">30</div>
                <div class="time-label">Secs</div>
            </div>
        </div>

        <form style="display: flex; gap: 10px; width: 100%; max-width: 500px; margin: 0 auto; background: var(--card-bg); padding: 10px; border-radius: 8px; box-shadow: 0 4px 15px var(--shadow);">
            <input type="email" class="form-control" placeholder="Enter your email address" style="border: none; box-shadow: none; flex-grow: 1;" required>
            <button type="submit" class="btn btn-primary" style="white-space: nowrap;">Notify Me</button>
        </form>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
